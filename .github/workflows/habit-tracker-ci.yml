name: Habit Tracker CI

on:
  push:
    paths:
      - 'habit-tracker/**'
      - '.github/workflows/habit-tracker-ci.yml'
  pull_request:
    paths:
      - 'habit-tracker/**'
      - '.github/workflows/habit-tracker-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: habit-tracker
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test